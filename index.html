<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compiler Studio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2E75B6;
            --primary-dark: #1e4d82;
            --primary-light: #4a9fd8;
            --success: #27ae60;
            --error: #e74c3c;
            --warning: #f39c12;
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fa;
            --text-primary: #2c3e50;
            --text-secondary: #7f8c8d;
            --border: #dfe6e9;
            --shadow-md: 0 4px 8px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 8px 16px rgba(0, 0, 0, 0.15);
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        .dashboard {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .dashboard-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 2rem;
            box-shadow: var(--shadow-lg);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-content h1 {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 0.85rem;
            opacity: 0.9;
        }

        .status {
            padding: 0.5rem 1rem;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.2);
            font-size: 0.9rem;
            font-weight: 600;
            transition: background 0.3s;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            padding: 1.5rem;
            flex: 1;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
        }

        .panel {
            background: var(--bg-primary);
            border-radius: 12px;
            box-shadow: var(--shadow-md);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            background: var(--bg-secondary);
            padding: 1rem 1.5rem;
            border-bottom: 2px solid var(--border);
        }

        .panel-header h2 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
        }

        /* Sample buttons grouped by category */
        .sample-groups {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .sample-group {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            background: #f0f0f0;
            border-radius: 8px;
            padding: 0.3rem 0.5rem;
        }

        .group-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            opacity: 0.6;
            padding-right: 0.25rem;
            border-right: 1px solid var(--border);
            margin-right: 0.1rem;
        }

        .sample-btn {
            padding: 0.35rem 0.7rem;
            border: 1px solid var(--border);
            background: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.78rem;
            font-weight: 500;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .sample-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .sample-btn.error-btn:hover {
            background: var(--error);
            border-color: var(--error);
        }

        .sample-btn.warning-btn:hover {
            background: var(--warning);
            border-color: var(--warning);
        }

        .sample-btn.clear-btn:hover {
            background: var(--text-secondary);
            border-color: var(--text-secondary);
        }

        .code-editor {
            flex: 1;
            padding: 1.5rem;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 0.95rem;
            border: none;
            resize: none;
            background: linear-gradient(0deg, #fafbfc, #ffffff);
            color: var(--text-primary);
            line-height: 1.8;
            outline: none;
            overflow-y: auto;
            min-height: 300px;
        }

        .tab-panel {
            background: var(--bg-primary);
            border-radius: 12px;
            box-shadow: var(--shadow-md);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .tab-buttons {
            display: flex;
            background: var(--bg-secondary);
            border-bottom: 2px solid var(--border);
            padding: 0.5rem;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 0.75rem 1rem;
            border: none;
            background: transparent;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text-secondary);
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
        }

        .tab-btn:hover {
            color: var(--primary);
        }

        .tab-btn.active {
            color: var(--primary);
            background: white;
            border-bottom-color: var(--primary);
        }

        .tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* AST tab needs overflow for the SVG */
        #ast.tab-content {
            overflow: auto;
            padding: 0.5rem;
        }

        .badge {
            display: inline-block;
            min-width: 20px;
            height: 20px;
            padding: 0 0.4rem;
            background: var(--primary);
            color: white;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-left: 0.5rem;
            text-align: center;
        }

        .messages {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            padding: 1rem;
            border-radius: 8px;
            border-left: 4px solid;
            background: #f9f9f9;
        }

        .message.error {
            border-left-color: var(--error);
            background: rgba(231, 76, 60, 0.05);
        }

        .message.warning {
            border-left-color: var(--warning);
            background: rgba(243, 156, 18, 0.05);
        }

        .message-header {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
        }

        .message .severity {
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            color: white;
        }

        .message.error .severity {
            background: var(--error);
        }

        .message.warning .severity {
            background: var(--warning);
        }

        .symbol-table table {
            width: 100%;
            border-collapse: collapse;
            font-family: monospace;
            font-size: 0.9rem;
        }

        .symbol-table thead {
            background: var(--primary);
            color: white;
        }

        .symbol-table th,
        .symbol-table td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        .symbol-table tr:hover {
            background: var(--bg-secondary);
        }

        .symbol-table .var-name {
            font-weight: 600;
            color: var(--primary);
        }

        .token-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .token {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.75rem;
            background: var(--bg-secondary);
            border-radius: 6px;
            border: 1px solid var(--border);
            font-family: monospace;
            font-size: 0.85rem;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 2rem;
            color: var(--text-secondary);
        }

        /* D3 AST Tree styles */
        #ast-svg {
            width: 100%;
            min-height: 400px;
            display: block;
        }

        .ast-tree-node circle {
            fill: white;
            stroke: var(--primary);
            stroke-width: 2px;
            cursor: pointer;
            transition: fill 0.2s;
        }

        .ast-tree-node circle:hover {
            fill: var(--primary-light);
        }

        .ast-tree-node.leaf circle {
            stroke: var(--success);
        }

        .ast-tree-node text {
            font-family: 'Monaco', monospace;
            font-size: 11px;
            fill: var(--text-primary);
            pointer-events: none;
        }

        .ast-tree-node text.node-type {
            font-weight: 700;
            fill: var(--primary);
        }

        .ast-tree-node.leaf text.node-type {
            fill: var(--success);
        }

        .ast-tree-node text.node-value {
            fill: var(--warning);
            font-style: italic;
        }

        .ast-link {
            fill: none;
            stroke: var(--border);
            stroke-width: 1.5px;
        }

        .ast-controls {
            display: flex;
            gap: 0.5rem;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            background: var(--bg-secondary);
        }

        .ast-controls button {
            padding: 0.3rem 0.75rem;
            border: 1px solid var(--border);
            background: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .ast-controls button:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .ast-empty {
            text-align: center;
            padding: 3rem 2rem;
            color: var(--text-secondary);
        }

        .footer {
            background: var(--bg-primary);
            border-top: 1px solid var(--border);
            padding: 1.5rem;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="dashboard">
        <header class="dashboard-header">
            <div class="header-content">
                <h1>⚙️ Compiler Studio</h1>
                <p class="subtitle">Lexical Analysis → Parsing → Semantic Analysis</p>
            </div>
            <div id="status" class="status">Ready</div>
        </header>

        <div class="container">
            <!-- Left: Source Code -->
            <div class="panel">
                <div class="panel-header">
                    <h2>Source Code</h2>
                    <div class="sample-groups">
                        <!-- Valid examples -->
                        <div class="sample-group">
                            <span class="group-label">✓ Valid</span>
                            <button class="sample-btn" onclick="loadSample('simple')">Simple</button>
                            <button class="sample-btn" onclick="loadSample('arithmetic')">Arithmetic</button>
                        </div>
                        <!-- Error examples -->
                        <div class="sample-group">
                            <span class="group-label">✗ Errors</span>
                            <button class="sample-btn error-btn" onclick="loadSample('error_type_mismatch')">Type
                                Mismatch</button>
                            <button class="sample-btn error-btn"
                                onclick="loadSample('error_undeclared')">Undeclared</button>
                        </div>
                        <!-- Warning example -->
                        <div class="sample-group">
                            <span class="group-label">⚠ Warning</span>
                            <button class="sample-btn warning-btn" onclick="loadSample('warning')">Unused Var</button>
                        </div>
                        <!-- Clear -->
                        <div class="sample-group">
                            <button class="sample-btn clear-btn" onclick="loadSample('clear')">Clear</button>
                        </div>
                    </div>
                </div>
                <textarea class="code-editor" id="sourceCode" placeholder="Enter source code...">int x;
x = 5 + 2;</textarea>
            </div>

            <!-- Right: Results -->
            <div class="panel">
                <div class="tab-buttons">
                    <button class="tab-btn active" onclick="switchTab('messages', this)">📋 Messages <span class="badge"
                            id="msgCount">0</span></button>
                    <button class="tab-btn" onclick="switchTab('symbols', this)">📊 Symbols <span class="badge"
                            id="symCount">0</span></button>
                    <button class="tab-btn" onclick="switchTab('tokens', this)">🔤 Tokens <span class="badge"
                            id="tokCount">0</span></button>
                    <button class="tab-btn" onclick="switchTab('ast', this)">🌳 AST</button>
                </div>

                <div id="messages" class="tab-content active">
                    <div class="messages" id="messagesContainer">
                        <div class="empty-state">Ready to compile...</div>
                    </div>
                </div>

                <div id="symbols" class="tab-content">
                    <div id="symbolTable"></div>
                </div>

                <div id="tokens" class="tab-content">
                    <div class="token-list" id="tokenList"></div>
                </div>

                <div id="ast" class="tab-content">
                    <div class="ast-controls">
                        <button onclick="zoomIn()">＋ Zoom In</button>
                        <button onclick="zoomOut()">－ Zoom Out</button>
                        <button onclick="resetZoom()">↺ Reset</button>
                    </div>
                    <div id="astContainer"></div>
                </div>
            </div>
        </div>

        <footer class="footer">
            <p>Compiler Project — Lexical Analysis | Syntax Analysis | Semantic Analysis</p>
        </footer>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';

        // ─── Sample code definitions ────────────────────────────────────────────
        const SAMPLES = {
            simple: `int x;`,

            arithmetic:
                `int x;
                int y;
                x = 5;
                y = 10;
                int sum;
                sum = x + y;`,

            error_type_mismatch:
                `int x;
                x = "hello";`,

            error_undeclared:
                `y = 5;`,

            warning:
                `int x;
                int unused;
                x = 42;`,

            clear: ``
        };

        // ─── Debounce ────────────────────────────────────────────────────────────
        function debounce(func, delay) {
            let id;
            return function (...args) {
                clearTimeout(id);
                id = setTimeout(() => func(...args), delay);
            };
        }

        // ─── Event listener ──────────────────────────────────────────────────────
        const sourceCode = document.getElementById('sourceCode');
        sourceCode.addEventListener('input', debounce(compile, 500));

        // ─── Compile ─────────────────────────────────────────────────────────────
        async function compile() {
            const code = sourceCode.value;
            if (!code.trim()) {
                setStatus('Ready', '');
                clearAll();
                return;
            }

            setStatus('Compiling…', 'rgba(52,152,219,0.3)');

            try {
                const response = await fetch(`${API_URL}/compile`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ source: code })
                });
                const data = await response.json();

                if (data.success) {
                    setStatus('✓ Valid', 'rgba(39,174,96,0.3)');
                } else {
                    setStatus('✗ Error', 'rgba(231,76,60,0.3)');
                }

                updateMessages(data.messages);
                updateSymbolTable(data.symbolTable);
                updateTokens(data.tokens);
                updateAST(data.ast);

            } catch (err) {
                setStatus('✗ Server Error', 'rgba(231,76,60,0.3)');
                document.getElementById('messagesContainer').innerHTML = `
                    <div class="message error">
                        <p>Connection failed. Is the Flask server running?</p>
                        <p style="font-size:0.8rem;margin-top:0.5rem;">Run: <code>python compiler_api.py</code></p>
                    </div>`;
            }
        }

        function setStatus(text, bg) {
            const el = document.getElementById('status');
            el.textContent = text;
            el.style.background = bg || 'rgba(255,255,255,0.2)';
        }

        function clearAll() {
            document.getElementById('messagesContainer').innerHTML = '<div class="empty-state">Ready to compile...</div>';
            document.getElementById('symbolTable').innerHTML = '';
            document.getElementById('tokenList').innerHTML = '';
            document.getElementById('astContainer').innerHTML = '';
            document.getElementById('msgCount').textContent = '0';
            document.getElementById('symCount').textContent = '0';
            document.getElementById('tokCount').textContent = '0';
        }

        // ─── Messages ────────────────────────────────────────────────────────────
        function updateMessages(messages) {
            const container = document.getElementById('messagesContainer');
            document.getElementById('msgCount').textContent = messages.length;

            if (!messages || messages.length === 0) {
                container.innerHTML = '<div class="empty-state">✓ No errors or warnings</div>';
                return;
            }

            container.innerHTML = messages.map(msg => `
                <div class="message ${msg.severity.toLowerCase()}">
                    <div class="message-header">
                        <span style="font-weight:700;">[${msg.code}]</span>
                        <span class="severity">${msg.severity}</span>
                        <span style="margin-left:auto;color:var(--text-secondary);">Line ${msg.line}</span>
                    </div>
                    <p style="margin:0;">${msg.message}</p>
                </div>`).join('');
        }

        // ─── Symbol Table ─────────────────────────────────────────────────────────
        function updateSymbolTable(symbols) {
            const container = document.getElementById('symbolTable');
            const count = Object.keys(symbols || {}).length;
            document.getElementById('symCount').textContent = count;

            if (count === 0) {
                container.innerHTML = '<div class="empty-state">No variables declared</div>';
                return;
            }

            container.innerHTML = `
                <table class="symbol-table">
                    <thead><tr>
                        <th>Variable</th><th>Type</th><th>Line</th><th>Used</th><th>Assigned</th>
                    </tr></thead>
                    <tbody>
                        ${Object.entries(symbols).map(([name, info]) => `
                            <tr>
                                <td class="var-name">${name}</td>
                                <td>${info.type}</td>
                                <td>${info.line}</td>
                                <td>${info.used ? '✓' : '✗'}</td>
                                <td>${info.assigned ? '✓' : '✗'}</td>
                            </tr>`).join('')}
                    </tbody>
                </table>`;
        }

        // ─── Tokens ───────────────────────────────────────────────────────────────
        function updateTokens(tokens) {
            const container = document.getElementById('tokenList');
            document.getElementById('tokCount').textContent = (tokens || []).length;

            if (!tokens || tokens.length === 0) {
                container.innerHTML = '<div class="empty-state">No tokens</div>';
                return;
            }

            container.innerHTML = tokens.map(tok => `
                <div class="token">
                    <strong>${tok.type}</strong>
                    <span style="color:var(--success);font-weight:600;">${tok.value}</span>
                    <span style="color:var(--text-secondary);font-size:0.8rem;">:${tok.line}</span>
                </div>`).join('');
        }

        // ─── AST D3 Tree ──────────────────────────────────────────────────────────
        let svgEl = null;
        let zoomBehavior = null;
        let gEl = null;

        function updateAST(ast) {
            const container = document.getElementById('astContainer');
            container.innerHTML = '';

            if (!ast || ast.length === 0) {
                container.innerHTML = '<div class="ast-empty empty-state">No AST available</div>';
                return;
            }

            // Wrap multiple roots under a virtual Program node
            const root = ast.length === 1
                ? ast[0]
                : { type: 'Program', children: ast };

            drawASTTree(root, container);
        }

        function drawASTTree(rootData, container) {
            const width = container.clientWidth || 700;
            const nodeH = 70;

            // Convert our AST format to d3 hierarchy
            function toHierarchy(node) {
                return {
                    name: node.type,
                    value: node.value || null,
                    isLeaf: !node.children || node.children.length === 0,
                    children: (node.children || []).map(toHierarchy)
                };
            }

            const hierarchyData = d3.hierarchy(toHierarchy(rootData));
            const nodeCount = hierarchyData.descendants().length;
            const height = Math.max(400, (hierarchyData.height + 1) * nodeH + 60);

            const treeLayout = d3.tree().size([width - 80, height - 80]);
            treeLayout(hierarchyData);

            const svg = d3.create('svg')
                .attr('id', 'ast-svg')
                .attr('viewBox', `0 0 ${width} ${height}`)
                .attr('width', width)
                .attr('height', height)
                .style('font-family', 'monospace');

            svgEl = svg;

            zoomBehavior = d3.zoom()
                .scaleExtent([0.3, 3])
                .on('zoom', (event) => {
                    gEl.attr('transform', event.transform);
                });

            svg.call(zoomBehavior);

            const g = svg.append('g')
                .attr('transform', 'translate(40,40)');

            gEl = g;

            // Links
            g.selectAll('.ast-link')
                .data(hierarchyData.links())
                .join('path')
                .attr('class', 'ast-link')
                .attr('d', d3.linkVertical()
                    .x(d => d.x)
                    .y(d => d.y));

            // Nodes
            const node = g.selectAll('.ast-tree-node')
                .data(hierarchyData.descendants())
                .join('g')
                .attr('class', d => `ast-tree-node${d.data.isLeaf ? ' leaf' : ''}`)
                .attr('transform', d => `translate(${d.x},${d.y})`);

            node.append('circle').attr('r', 22);

            // Type label (inside circle)
            node.append('text')
                .attr('class', 'node-type')
                .attr('text-anchor', 'middle')
                .attr('dy', d => d.data.value ? '-0.3em' : '0.35em')
                .style('font-size', d => d.data.name.length > 8 ? '9px' : '11px')
                .text(d => d.data.name);

            // Value label (below type, inside circle)
            node.filter(d => d.data.value)
                .append('text')
                .attr('class', 'node-value')
                .attr('text-anchor', 'middle')
                .attr('dy', '0.9em')
                .style('font-size', '9px')
                .text(d => d.data.value);

            container.appendChild(svg.node());
        }

        function zoomIn() {
            if (svgEl && zoomBehavior) {
                svgEl.transition().call(zoomBehavior.scaleBy, 1.3);
            }
        }

        function zoomOut() {
            if (svgEl && zoomBehavior) {
                svgEl.transition().call(zoomBehavior.scaleBy, 0.77);
            }
        }

        function resetZoom() {
            if (svgEl && zoomBehavior) {
                svgEl.transition().call(zoomBehavior.transform, d3.zoomIdentity);
            }
        }

        // ─── Tab switching ────────────────────────────────────────────────────────
        function switchTab(tab, btn) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            if (btn) btn.classList.add('active');
        }

        // ─── Load sample ──────────────────────────────────────────────────────────
        function loadSample(key) {
            sourceCode.value = SAMPLES[key] ?? '';
            compile();
        }

        // ─── Initial compile ──────────────────────────────────────────────────────
        compile();
    </script>
</body>

</html>
